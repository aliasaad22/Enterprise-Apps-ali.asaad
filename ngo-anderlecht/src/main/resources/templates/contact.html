<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- MAIN -->
<main class="flex-grow">
    <div class="max-w-3xl mx-auto px-4 py-8">

        <!-- HEADER -->
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800">
                Contacteer Ons
            </h1>
            <p class="text-gray-500 mt-1">
                We antwoorden zo snel mogelijk op je bericht
            </p>
        </div>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${success}"
             class="mb-6 p-4 rounded-lg bg-green-100 text-green-800 border border-green-200">
            ✔ Je bericht is succesvol verzonden!
        </div>

        <!-- FORM CARD -->
        <div class="bg-white rounded-lg shadow p-6">

            <form th:action="@{/contact}"
                  th:object="${contactForm}"
                  method="post"
                  class="space-y-5">

                <!-- Naam -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Naam *
                    </label>
                    <input type="text"
                           th:field="*{name}"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                    <p class="text-red-600 text-sm mt-1"
                       th:errors="*{name}">
                    </p>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Email *
                    </label>
                    <input type="email"
                           th:field="*{email}"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                    <p class="text-red-600 text-sm mt-1"
                       th:errors="*{email}">
                    </p>
                </div>

                <!-- Bericht -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Bericht *
                    </label>
                    <textarea th:field="*{message}"
                              rows="5"
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>

                    <p class="text-red-600 text-sm mt-1"
                       th:errors="*{message}">
                    </p>
                </div>

                <!-- BUTTON -->
                <div class="pt-2">
                    <button type="submit"
                            class="w-full bg-blue-600 text-white py-2.5 rounded-lg shadow hover:bg-blue-700 transition">
                        Verstuur bericht
                    </button>
                </div>

            </form>

        </div>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
