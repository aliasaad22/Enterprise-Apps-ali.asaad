<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${title}">NGO Anderlecht</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

<!-- NAVBAR -->
<nav class="bg-blue-700 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">

        <a href="/events" class="text-lg font-bold tracking-wide hover:opacity-90">
            NGO Anderlecht
        </a>

        <div class="flex items-center space-x-6 text-sm font-medium">
            <a href="/events" class="hover:text-blue-200 transition">Events</a>
            <a href="/about" class="hover:text-blue-200 transition">About</a>
            <a href="/contact" class="hover:text-blue-200 transition">Contact</a>
        </div>

    </div>
</nav>

<!-- MAIN CONTENT -->
<main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <th:block th:replace="${content}"></th:block>
    </div>
</main>

<!-- FOOTER -->
<footer class="bg-gray-800 text-white mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-300">
        © <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2024</span>
        NGO Anderlecht. All rights reserved.
    </div>
</footer>

</body>
</html>
