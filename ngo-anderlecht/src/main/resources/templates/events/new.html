<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nieuw Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- MAIN -->
<main class="flex-grow">
    <div class="max-w-3xl mx-auto px-4 py-8">

        <!-- HEADER -->
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800">
                Nieuw Event
            </h1>
            <p class="text-gray-500 mt-1">
                Velden met * zijn verplicht
            </p>
        </div>

        <!-- FORM CARD -->
        <form th:action="@{/events/new}"
              th:object="${event}"
              method="post"
              class="bg-white rounded-lg shadow p-6 space-y-6">

            <!-- Titel -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Titel *
                </label>
                <input type="text"
                       th:field="*{title}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                <p class="text-red-600 text-sm mt-1"
                   th:errors="*{title}">
                </p>
            </div>

            <!-- Beschrijving -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Beschrijving *
                </label>
                <textarea th:field="*{description}"
                          rows="4"
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>

                <p class="text-red-600 text-sm mt-1"
                   th:errors="*{description}">
                </p>
            </div>

            <!-- Organisatie -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Organisatie *
                </label>
                <input type="text"
                       th:field="*{organization}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                <p class="text-red-600 text-sm mt-1"
                   th:errors="*{organization}">
                </p>
            </div>

            <!-- Locatie -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Locatie *
                </label>

                <select name="locationId"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        required>

                    <option value="">-- Kies een locatie --</option>

                    <option th:each="loc : ${locations}"
                            th:value="${loc.id}"
                            th:text="${loc.name + ' (' + loc.address + ')'}">
                    </option>

                </select>

                <p class="text-red-600 text-sm mt-1"
                   th:if="${locationError}"
                   th:text="${locationError}">
                </p>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Contact Email *
                </label>
                <input type="email"
                       th:field="*{contactEmail}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                <p class="text-red-600 text-sm mt-1"
                   th:errors="*{contactEmail}">
                </p>
            </div>

            <!-- Datum -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Datum & Tijd *
                </label>
                <input type="datetime-local"
                       th:field="*{dateTime}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                <p class="text-red-600 text-sm mt-1"
                   th:errors="*{dateTime}">
                </p>
            </div>

            <!-- BUTTONS -->
            <div class="flex items-center justify-between pt-4">

                <a href="/events"
                   class="text-gray-600 hover:text-gray-800 transition">
                    ← Annuleren
                </a>

                <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2.5 rounded-lg shadow hover:bg-blue-700 transition">
                    Opslaan
                </button>

            </div>

        </form>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
