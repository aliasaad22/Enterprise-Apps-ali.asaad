<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- MAIN -->
<main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 py-8">

        <!-- HEADER -->
        <div class="mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">
                NGO Anderlecht Events
            </h1>
            <p class="text-gray-600 mt-2">
                Overzicht van de laatste gemeenschapsevenementen
            </p>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

            <div class="bg-white rounded-lg shadow p-5">
                <p class="text-sm text-gray-500">Totaal events</p>
                <p class="text-2xl font-bold text-gray-800"
                   th:text="${#lists.size(events)}"></p>
            </div>

            <div class="bg-white rounded-lg shadow p-5">
                <p class="text-sm text-gray-500">Organisaties</p>
                <p class="text-lg font-semibold text-gray-800">
                    Gemeente + Partners
                </p>
            </div>

            <div class="bg-white rounded-lg shadow p-5">
                <p class="text-sm text-gray-500">Status</p>
                <p class="text-green-600 font-semibold">
                    Actief
                </p>
            </div>

        </div>

        <!-- TABLE CARD -->
        <div class="bg-white rounded-lg shadow overflow-hidden">

            <div class="px-6 py-4 border-b">
                <h2 class="text-lg font-semibold text-gray-800">
                    Event overzicht
                </h2>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">

                    <thead class="bg-gray-50 text-gray-600 text-sm">
                    <tr>
                        <th class="p-4">Titel</th>
                        <th class="p-4">Organisatie</th>
                        <th class="p-4">Actie</th>
                    </tr>
                    </thead>

                    <tbody class="divide-y">

                    <tr th:each="event : ${events}"
                        class="hover:bg-gray-50 transition">

                        <td class="p-4 font-medium text-gray-800"
                            th:text="${event.title}">
                        </td>

                        <td class="p-4 text-gray-600"
                            th:text="${event.organization}">
                        </td>

                        <td class="p-4">
                            <a th:href="@{'/events/' + ${event.id}}"
                               class="text-blue-600 hover:text-blue-800 font-medium transition">
                                Details
                            </a>
                        </td>

                    </tr>

                    </tbody>

                </table>
            </div>

        </div>

        <!-- BUTTON -->
        <div class="mt-6">
            <a href="/events/new"
               class="inline-flex items-center bg-blue-600 text-white px-5 py-3 rounded-lg shadow hover:bg-blue-700 transition">
                + Nieuw Event
            </a>
        </div>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
