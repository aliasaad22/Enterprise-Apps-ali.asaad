<div th:fragment="content">
    <h1 class="text-3xl font-bold mb-4">Laatste Events</h1>

    <a href="/events/new" class="bg-blue-600 text-white px-4 py-2 rounded">Nieuw Event</a>

    <div class="mt-6 bg-white p-4 rounded shadow">
        <table class="w-full">
            <thead>
                <tr class="border-b">
                    <th class="text-left p-2">Titel</th>
                    <th class="text-left p-2">Datum</th>
                    <th class="text-left p-2">Organisatie</th>
                    <th class="text-left p-2">Details</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="event : ${events}" class="border-b">
                    <td class="p-2" th:text="${event.title}"></td>
                    <td class="p-2" th:text="${#temporals.format(event.dateTime, 'dd MMM yyyy – HH:mm')}"></td>
                    <td class="p-2" th:text="${event.organization}"></td>
                    <td class="p-2">
                        <a th:href="@{'/events/' + ${event.id}}" class="text-blue-600">Bekijk</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block th:replace="layout :: content"></th:block>
