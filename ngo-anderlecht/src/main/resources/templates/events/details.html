<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mx-auto mt-6">

    <h1 class="text-3xl font-bold mb-4">
        Event Details
    </h1>

    <div class="bg-white p-6 rounded shadow space-y-4">

        <div>
            <h2 class="text-xl font-semibold">Titel</h2>
            <p th:text="${event.title}"></p>
        </div>

        <div>
            <h2 class="text-xl font-semibold">Beschrijving</h2>
            <p th:text="${event.description}"></p>
        </div>

        <div>
            <h2 class="text-xl font-semibold">Organisatie</h2>
            <p th:text="${event.organization}"></p>
        </div>

        <div>
            <h2 class="text-xl font-semibold">
                Contactpersoon Email
            </h2>

            <p th:text="${event.contactEmail}"></p>
        </div>

        <div>
            <h2 class="text-xl font-semibold">
                Datum & Tijd
            </h2>

            <p th:text="${#temporals.format(event.dateTime, 'dd/MM/yyyy HH:mm')}"></p>
        </div>

        <div>
            <h2 class="text-xl font-semibold">
                Locatie
            </h2>

            <p>
                <span th:text="${event.location.name}"></span>
                <br>

                <span th:text="${event.location.address}"></span>
                <br>

                Capaciteit:
                <span th:text="${event.location.capacity}"></span>
                personen
            </p>
        </div>

    </div>

    <div class="mt-4">

        <a href="/events"
           class="bg-gray-600 text-white px-4 py-2 rounded inline-block">

            Terug naar overzicht

        </a>

    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
