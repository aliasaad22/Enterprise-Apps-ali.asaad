<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- MAIN -->
<main class="flex-grow">
    <div class="max-w-4xl mx-auto px-4 py-8">

        <!-- HEADER -->
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-gray-800">
                Event Details
            </h1>
            <p class="text-gray-500 mt-1">
                Overzicht van alle informatie van dit event
            </p>
        </div>

        <!-- CARD -->
        <div class="bg-white rounded-lg shadow overflow-hidden">

            <div class="p-6 space-y-6">

                <!-- Titel -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
                        Titel
                    </h2>
                    <p class="text-lg font-medium text-gray-800"
                       th:text="${event.title}">
                    </p>
                </div>

                <!-- Beschrijving -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
                        Beschrijving
                    </h2>
                    <p class="text-gray-700"
                       th:text="${event.description}">
                    </p>
                </div>

                <!-- Organisatie -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
                        Organisatie
                    </h2>
                    <p class="text-gray-800 font-medium"
                       th:text="${event.organization}">
                    </p>
                </div>

                <!-- Contact -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
                        Contactpersoon
                    </h2>
                    <p class="text-gray-700"
                       th:text="${event.contactEmail}">
                    </p>
                </div>

                <!-- Datum -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
                        Datum & Tijd
                    </h2>
                    <p class="text-gray-800 font-medium"
                       th:text="${#temporals.format(event.dateTime, 'dd/MM/yyyy HH:mm')}">
                    </p>
                </div>

                <!-- Locatie -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
                        Locatie
                    </h2>

                    <div class="text-gray-700 space-y-1">
                        <p class="font-medium text-gray-800"
                           th:text="${event.location.name}">
                        </p>

                        <p th:text="${event.location.address}"></p>

                        <p class="text-sm text-gray-600">
                            Capaciteit:
                            <span class="font-semibold"
                                  th:text="${event.location.capacity}"></span>
                            personen
                        </p>
                    </div>
                </div>

            </div>

        </div>

        <!-- BACK BUTTON -->
        <div class="mt-6">
            <a href="/events"
               class="inline-flex items-center bg-gray-700 text-white px-5 py-2.5 rounded-lg shadow hover:bg-gray-800 transition">
                ← Terug naar overzicht
            </a>
        </div>

    </div>
</main>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
